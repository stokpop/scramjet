spring.application.name=scramjet

scramjet.name=${spring.application.name}
scramjet.delay-call-limit=10
scramjet.remote-call-base-url=http://localhost:${server.port:8080}

# OTLP metrics export (point at an OpenTelemetry collector)
management.otlp.metrics.export.url=http://localhost:4318/v1/metrics
management.otlp.metrics.export.step=10s
management.opentelemetry.resource-attributes.service.name=${spring.application.name}

# request latency histograms for http server requests
management.metrics.distribution.percentiles-histogram.http.server.requests=true

management.endpoints.web.exposure.include=health,info,metrics

# uncomment to run request handling on virtual threads
#spring.threads.virtual.enabled=true
